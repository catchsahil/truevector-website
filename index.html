<script type="text/babel" data-presets="react">

const { useState, useEffect, useRef } = React;
const LOGO = 'assets/truevector_logo.png';

/* ── Lucide icon wrapper ─────────────────────────── */
function Icon({ name, size = 18, style: extraStyle, ...props }) {
  // Lucide UMD exposes icons as [tag, attrs, children] arrays
  // Convert the icon name from kebab-case to PascalCase to look up in window.lucide
  const toPascal = s => s.replace(/(^|-)([a-z])/g, (_, __, c) => c.toUpperCase());
  const iconData = window.lucide && window.lucide[toPascal(name)];
  if (!iconData) return <span style={{display:'inline-flex',width:size,height:size,...extraStyle}} />;

  function renderNode([tag, attrs, children]) {
    const childNodes = (children || []).map((c, i) => renderNode(c));
    if (tag === 'svg') {
      return (
        <svg key="svg" xmlns="http://www.w3.org/2000/svg" width={size} height={size}
          viewBox="0 0 24 24" fill="none" stroke="currentColor"
          strokeWidth={attrs.strokeWidth || 2} strokeLinecap={attrs.strokeLinecap || 'round'} strokeLinejoin={attrs.strokeLinejoin || 'round'}
          style={extraStyle}>
          {childNodes}
        </svg>
      );
    }
    const { d, cx, cy, r, x, y, x1, y1, x2, y2, rx, ry, points, width, height: h, ...rest } = attrs || {};
    const svgAttrs = {};
    if (d !== undefined) svgAttrs.d = d;
    if (cx !== undefined) svgAttrs.cx = cx;
    if (cy !== undefined) svgAttrs.cy = cy;
    if (r !== undefined) svgAttrs.r = r;
    if (x !== undefined) svgAttrs.x = x;
    if (y !== undefined) svgAttrs.y = y;
    if (x1 !== undefined) svgAttrs.x1 = x1;
    if (y1 !== undefined) svgAttrs.y1 = y1;
    if (x2 !== undefined) svgAttrs.x2 = x2;
    if (y2 !== undefined) svgAttrs.y2 = y2;
    if (rx !== undefined) svgAttrs.rx = rx;
    if (ry !== undefined) svgAttrs.ry = ry;
    if (points !== undefined) svgAttrs.points = points;
    if (width !== undefined) svgAttrs.width = width;
    if (h !== undefined) svgAttrs.height = h;
    return React.createElement(tag, { key: JSON.stringify(svgAttrs), ...svgAttrs }, ...childNodes);
  }

  return renderNode(iconData);
}

/* ── Animated counter ────────────────────────────── */
function Counter({ end, suffix = '', duration = 1800 }) {
  const [val, setVal] = useState(0);
  const ref = useRef(null);
  const started = useRef(false);
  useEffect(() => {
    const obs = new IntersectionObserver(([e]) => {
      if (e.isIntersecting && !started.current) {
        started.current = true;
        const start = performance.now();
        const tick = (now) => {
          const t = Math.min((now - start) / duration, 1);
          const eased = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
          setVal(Math.floor(eased * end));
          if (t < 1) requestAnimationFrame(tick);
          else setVal(end);
        };
        requestAnimationFrame(tick);
      }
    }, { threshold: 0.3 });
    if (ref.current) obs.observe(ref.current);
    return () => obs.disconnect();
  }, [end, duration]);
  return <span ref={ref}>{val}{suffix}</span>;
}

/* ════════════════════════════════════════════════════
   ENQUIRY MODAL
══════════════════════════════════════════════════════ */
function EnquiryModal({ isOpen, onClose, title }) {
  const [form, setForm] = React.useState({
    name:'', email:'', phone:'', company:'', country:'', services:[], callTime:'', timezone:''
  });
  const [status, setStatus] = React.useState('idle'); // idle | sending | sent | error
  const [errorMsg, setErrorMsg] = React.useState('');
  
  const serviceOptions = [
    'Company Incorporation','Statutory Compliance','Transfer Pricing',
    'Accounting & MIS','HR Payroll','FEMA / RBI Advisory','GST Registration & Filing','Other'
  ];
  const timezones = ['IST (UTC+5:30)','GMT (UTC+0)','CET (UTC+1)','EST (UTC-5)','PST (UTC-8)','JST (UTC+9)','KST (UTC+9)','AEST (UTC+10)'];
  
  const toggle = (svc) => {
    setForm(f => ({
      ...f,
      services: f.services.includes(svc) ? f.services.filter(x=>x!==svc) : [...f.services, svc]
    }));
  };
  
  const handleSubmit = async (e) => {
    e.preventDefault();
    
    // Validation
    const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
    if (!emailRegex.test(form.email)) {
      setStatus('error');
      setErrorMsg('Please enter a valid email address (e.g. name@company.com)');
      return;
    }
    
    const countryBlacklist = ['test','testing','abc','xyz','na','n/a','none','null','random','asdf','qwerty','123','hello'];
    if (form.country.trim().length < 2 || countryBlacklist.includes(form.country.trim().toLowerCase())) {
      setStatus('error');
      setErrorMsg('Please enter a valid country name (e.g. Germany, Japan, United States)');
      return;
    }
    
    if (form.name.trim().length < 2) {
      setStatus('error');
      setErrorMsg('Please enter your full name');
      return;
    }
    
    setErrorMsg('');
    setStatus('sending');
    try {
      const body = `Name: ${form.name}
Email: ${form.email}
Phone: ${form.phone}
Company: ${form.company}
Country of HQ: ${form.country}
Services Required: ${form.services.join(', ')}
Preferred Call Time: ${form.callTime}
Timezone: ${form.timezone}`;
      
      const res = await fetch(`https://formsubmit.co/ajax/info@truevectorindia.com`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
        body: JSON.stringify({
          _subject: `New Enquiry from ${form.name} — ${form.company}`,
          _captcha: 'false',
          _template: 'table',
          name: form.name,
          email: form.email,
          phone: form.phone,
          company: form.company,
          country_of_hq: form.country,
          services_required: form.services.join(', '),
          preferred_call_time: form.callTime,
          timezone: form.timezone,
        })
      });
      const data = await res.json();
      if (data.success === 'true' || res.ok) {
        setStatus('sent');
      } else {
        setStatus('error');
      }
    } catch(err) {
      setStatus('error');
    }
  };
  
  if (!isOpen) return null;
  
  return (
    <div style={{position:'fixed',inset:0,zIndex:9999,display:'flex',alignItems:'center',justifyContent:'center',padding:'16px'}}>
      <div style={{position:'absolute',inset:0,background:'rgba(10,31,63,0.75)',backdropFilter:'blur(4px)'}} onClick={onClose} />
      <div style={{position:'relative',background:'var(--white)',borderRadius:'var(--radius-lg)',padding:'0',maxWidth:'600px',width:'100%',maxHeight:'90vh',overflowY:'auto',boxShadow:'0 24px 64px rgba(10,31,63,0.3)'}}>
        {/* Header */}
        <div style={{background:'var(--navy)',padding:'28px 32px 24px',borderRadius:'var(--radius-lg) var(--radius-lg) 0 0',position:'sticky',top:0,zIndex:1}}>
          <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start'}}>
            <div>
              <div style={{fontSize:'11px',fontWeight:700,letterSpacing:'0.14em',textTransform:'uppercase',color:'var(--gold)',marginBottom:'6px'}}>Get a Proposal</div>
              <h2 style={{fontFamily:"var(--font-serif)",fontSize:'24px',color:'var(--white)',margin:0,fontWeight:500}}>{title || "Start Your India Journey"}</h2>
              <p style={{fontSize:'13px',color:'rgba(203,213,224,0.75)',marginTop:'6px'}}>We will respond within one business day.</p>
            </div>
            <button onClick={onClose} style={{background:'rgba(255,255,255,0.1)',border:'none',color:'rgba(255,255,255,0.7)',width:'32px',height:'32px',borderRadius:'50%',cursor:'pointer',fontSize:'18px',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>×</button>
          </div>
        </div>
        
        <div style={{padding:'28px 32px 32px'}}>
        {status === 'sent' ? (
          <div style={{textAlign:'center',padding:'40px 20px'}}>
            <div style={{width:'64px',height:'64px',background:'rgba(10,123,106,0.1)',borderRadius:'50%',display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 20px'}}>
              <Icon name="check" size={32} style={{color:'var(--teal)'}} />
            </div>
            <h3 style={{fontFamily:"var(--font-serif)",fontSize:'24px',color:'var(--navy)',marginBottom:'10px'}}>Thank you!</h3>
            <p style={{color:'var(--steel)',fontSize:'15px',lineHeight:'1.6'}}>Your enquiry has been received. A TrueVector partner will be in touch within one business day.</p>
            <button onClick={onClose} style={{marginTop:'24px',background:'var(--teal)',color:'var(--white)',border:'none',padding:'12px 32px',borderRadius:'var(--radius-sm)',fontSize:'14px',fontWeight:600,cursor:'pointer'}}>Close</button>
          </div>
        ) : (
          <form onSubmit={handleSubmit}>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:'16px',marginBottom:'16px'}}>
              <div className="form-field">
                <label className="form-label">Full Name *</label>
                <input className="form-input" required value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} placeholder="Your full name" />
              </div>
              <div className="form-field">
                <label className="form-label">Business Email *</label>
                <input className="form-input" type="email" required value={form.email} 
                  onChange={e=>{setForm(f=>({...f,email:e.target.value}));setStatus('idle');}}
                  style={{borderColor: status==='error' && errorMsg.includes('email') ? '#c0392b' : ''}}
                  placeholder="you@company.com" />
              </div>
              <div className="form-field">
                <label className="form-label">Phone / WhatsApp</label>
                <input className="form-input" value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} placeholder="+1 234 567 8900" />
              </div>
              <div className="form-field">
                <label className="form-label">Company Name *</label>
                <input className="form-input" required value={form.company} onChange={e=>setForm(f=>({...f,company:e.target.value}))} placeholder="Parent company name" />
              </div>
              <div className="form-field" style={{gridColumn:'1/-1'}}>
                <label className="form-label">Country of Headquarters *</label>
                <input className="form-input" required value={form.country}
                  onChange={e=>{setForm(f=>({...f,country:e.target.value}));setStatus('idle');}}
                  style={{borderColor: status==='error' && errorMsg.includes('country') ? '#c0392b' : ''}}
                  placeholder="e.g. Germany, Japan, Netherlands" />
              </div>
            </div>
            
            <div style={{marginBottom:'16px'}}>
              <label className="form-label" style={{display:'block',marginBottom:'8px'}}>Services Required (select all that apply)</label>
              <div style={{display:'flex',flexWrap:'wrap',gap:'8px'}}>
                {serviceOptions.map(svc => (
                  <button type="button" key={svc} onClick={()=>toggle(svc)}
                    style={{fontSize:'12px',fontWeight:500,padding:'6px 14px',borderRadius:'9999px',border:'1.5px solid',cursor:'pointer',transition:'all 0.15s',
                      background:form.services.includes(svc)?'var(--teal)':'transparent',

/* ════════════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════════════ */
function App() {
  const [page, setPage] = useState(() => {
    return localStorage.getItem('tv_website_page') || 'home';
  });
  const [modalOpen, setModalOpen] = React.useState(false);
  const [modalTitle, setModalTitle] = React.useState('');
  const openModal = (title) => { setModalTitle(title || 'Start Your India Journey'); setModalOpen(true); };
  const closeModal = () => setModalOpen(false);

  const navigate = (p) => {
    if (p === 'contact') { openModal(); return; }
    setPage(p);
    localStorage.setItem('tv_website_page', p);
    window.scrollTo({ top: 0, behavior: 'smooth' });
  };

  // icons render inline via Icon component — no post-render pass needed

  const pageMap = {
    home: <HomePage onNavigate={navigate} />,
    entry: <EntryPage onNavigate={navigate} />,
    compliance: <CompliancePage onNavigate={navigate} />,
    payroll: <PayrollPage onNavigate={navigate} />,
    finance: <FinancePage onNavigate={navigate} />,
    'why-india': <WhyIndiaPage onNavigate={navigate} />,
    about: <AboutPage onNavigate={navigate} />,
    contact: <ContactPage />,
    privacy: <PrivacyPage onNavigate={navigate} />,
    terms: <TermsPage onNavigate={navigate} />,
    disclaimer: <DisclaimerPage onNavigate={navigate} />,
  };

  return (
    <>
      <EnquiryModal isOpen={modalOpen} onClose={closeModal} title={modalTitle} />
      <Nav currentPage={page} onNavigate={navigate} />
      <div className="page-wrap">
        {pageMap[page] || pageMap.home}
        <Footer onNavigate={navigate} />
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);

const loadingEl=document.getElementById('loading');if(loadingEl)loadingEl.style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
